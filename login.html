<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT TRINITY - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inria+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login-styles.css">
</head>
<body>
    <!-- Border Frame Container (Fixed) -->
    <div class="border-frame">
        <!-- Decorative corners -->
        <div class="corner corner-top-left"></div>
        <div class="corner corner-top-right"></div>
        <div class="corner corner-bottom-left"></div>
        <div class="corner corner-bottom-right"></div>
    </div>
 
    <div class="page-container">
        <!-- Login Section -->
        <section class="login-section">
            <!-- Tabs -->
            <div class="tabs-container">
                <div class="tab-buttons">
                    <button class="tab-button tab-active" data-tab="login">LOGIN</button>
                    <div class="tab-divider"></div>
                    <a href="register.html" class="tab-button tab-link">REGISTER</a>
                </div>
            </div>
 
            <!-- Login Form -->
            <form class="login-form" id="loginForm">
                <div class="form-wrapper">
                    <!-- Email/Username Input -->
                    <div class="form-group">
                        <label for="email-username" class="form-label">EMAIL / USERNAME</label>
                        <input 
                            type="text" 
                            id="email-username" 
                            name="email_username" 
                            class="form-input" 
                            placeholder=""
                            required
                        />
                        <div class="form-underline"></div>
                    </div>
 
                    <!-- Password Input -->
                    <div class="form-group">
                        <label for="password" class="form-label">PASSWORD</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-input" 
                            placeholder=""
                            required
                        />
                        <div class="form-underline"></div>
                    </div>
 
                    <!-- Enter Button -->
                    <button type="submit" class="enter-button">ENTER</button>
                </div>
            </form>
        </section>
    </div>
 
    <script src="js/script.js"></script>
    <script src="js/login-script.js"></script>
</body>
</html>
